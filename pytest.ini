[pytest]
# Test discovery paths
testpaths = tests

# Python files and classes to discover
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Python path for imports
pythonpath = .

# Markers for categorizing tests
markers =
    unit: Unit tests - fast, isolated tests for individual components
    integration: Integration tests - tests that verify component interactions
    slow: Slow tests - tests that take > 1 second or involve I/O

# Verbosity settings
verbose = true
addopts = -v

# Output settings
console_output_style = count

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Async settings (if needed for async tests)
asyncio_mode = auto
